name: Publish Android to Play Store

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane to run'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - release

concurrency:
  group: android-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-android:
    name: Build & Publish Android
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      APP_ID: ${{ vars.ANDROID_PACKAGE_NAME || 'app.lovable.c45b9e9dc98743ebb9fdffd4a02bf3ac' }}
      FASTLANE_LANE: ${{ github.event.inputs.lane || 'beta' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@8

      - name: Add Android platform (if needed)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: fastlane

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/keystore.jks

      - name: Create keystore properties
        run: |
          cat > android/keystore.properties << EOF
          storeFile=keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Setup Google Play service account
        run: |
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' \
            > fastlane/google-play-service-account.json

      - name: Run Fastlane
        run: bundle exec fastlane android ${{ env.FASTLANE_LANE }}
        working-directory: fastlane
        env:
          ANDROID_PACKAGE_NAME: ${{ vars.ANDROID_PACKAGE_NAME || 'app.lovable.c45b9e9dc98743ebb9fdffd4a02bf3ac' }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: fastlane/google-play-service-account.json

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: android/app/build/outputs/bundle/**/*.aab
          retention-days: 7

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 7

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f android/app/keystore.jks
          rm -f android/keystore.properties
          rm -f fastlane/google-play-service-account.json
